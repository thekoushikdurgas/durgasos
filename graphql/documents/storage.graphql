query StorageBuckets($params: JSON) {
  storageBuckets(params: $params)
}

query StorageList($params: JSON) {
  storageList(params: $params)
}

mutation StorageUpload($params: JSON!) {
  storageUpload(params: $params)
}

mutation StorageGetUrl($params: JSON!) {
  storageGetUrl(params: $params)
}

mutation StorageDelete($params: JSON!) {
  storageDelete(params: $params)
}

mutation StorageMove($params: JSON!) {
  storageMove(params: $params)
}

mutation StorageMkdir($params: JSON!) {
  storageMkdir(params: $params)
}
