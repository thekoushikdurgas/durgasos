query TodoTasks($workspaceId: String!) {
  todoTasks(workspaceId: $workspaceId) {
    id
    title
    column
    sortOrder
    workspaceId
    createdAt
    updatedAt
  }
}

mutation CreateTodoTask($workspaceId: String!, $column: String!, $title: String!) {
  createTodoTask(workspaceId: $workspaceId, column: $column, title: $title) {
    id
    title
    column
    sortOrder
    workspaceId
    createdAt
    updatedAt
  }
}

mutation MoveTodoTask($taskId: String!, $column: String!, $previousTaskId: String) {
  moveTodoTask(taskId: $taskId, column: $column, previousTaskId: $previousTaskId) {
    id
    title
    column
    sortOrder
    workspaceId
    createdAt
    updatedAt
  }
}

mutation DeleteTodoTask($taskId: String!) {
  deleteTodoTask(taskId: $taskId)
}

query TodoComments($taskId: String!) {
  todoComments(taskId: $taskId) {
    id
    taskId
    ownerId
    content
    createdAt
    updatedAt
  }
}

mutation CreateTodoComment($taskId: String!, $content: String!) {
  createTodoComment(taskId: $taskId, content: $content) {
    id
    taskId
    ownerId
    content
    createdAt
    updatedAt
  }
}

mutation DeleteTodoComment($commentId: String!) {
  deleteTodoComment(commentId: $commentId)
}
