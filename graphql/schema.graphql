type AsyncJobStatus {
  jobId: String!
  status: String!
  result: JSON
  error: String
  updatedAt: Float!
}

type AuthPayload {
  success: Boolean!
  requiresConfirmation: Boolean!
  user: GqlUser
  session: GqlSession
}

type GqlSession {
  accessToken: String!
  refreshToken: String!
  expiresIn: Int!
  expiresAt: Float
  tokenType: String!
}

type GqlUser {
  id: String!
  email: String
  userMetadata: JSON!
  appMetadata: JSON!
  createdAt: String
  updatedAt: String
  isActive: Boolean!
  isVerified: Boolean!
  profile: GqlUserProfile
}

type GqlUserProfile {
  username: String
  avatarUrl: String
  bio: String
  preferences: JSON
  createdAt: String
  updatedAt: String
}

type InstalledApps {
  id: ID!
  ownerId: String!
  appIds: [String!]!
  fileAssociations: JSON!
  updatedAt: String!
}

"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](https://ecma-international.org/wp-content/uploads/ECMA-404_2nd_edition_december_2017.pdf).
"""
scalar JSON
  @specifiedBy(
    url: "https://ecma-international.org/wp-content/uploads/ECMA-404_2nd_edition_december_2017.pdf"
  )

type Mutation {
  signUp(email: String!, password: String!, metadata: JSON = null): AuthPayload!
  signIn(email: String!, password: String!): AuthPayload!
  refreshSession(refreshToken: String = null): RefreshPayload!
  establishSession(
    accessToken: String!
    refreshToken: String!
    expiresIn: Int = null
  ): SessionCookieMutationResult!
  clearSession: SessionCookieMutationResult!
  chatCompletion(params: JSON!): JSON!
  deleteConversation(conversationId: String!): JSON!
  analyzeAgent(
    agentType: String!
    pageData: JSON!
