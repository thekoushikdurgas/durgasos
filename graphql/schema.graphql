scalar JSON

"""
Mirrors Strawberry schema in ai.backend/app/graphql/schema.py (camelCase field names).
"""
type Query {
  me: GqlUser
  emailRegistered(email: String!): Boolean!
  chatProviders: JSON
  chatConversations(limit: Int = 50): JSON
  chatConversation(conversationId: String!): JSON
  listAgents: JSON
  ragDocuments(collectionName: String, limit: Int = 100, offset: Int = 0): JSON
  ragQuery(query: String!, k: Int = 5, collectionName: String): JSON
  ragList(collectionName: String, limit: Int = 100, offset: Int = 0): JSON
  ragStats(collectionName: String): JSON
  storageList(params: JSON): JSON
  storageBuckets(params: JSON): JSON
  googlePhotosList(params: JSON): JSON
  gmailListMessages(params: JSON): JSON
  gmailGetMessage(params: JSON): JSON
  gmailListThreads(params: JSON): JSON
  gmailGetThread(params: JSON): JSON
  googleCalendarListEvents(params: JSON): JSON
  googlePeopleListContacts(params: JSON): JSON
  googleDriveListFiles(params: JSON): JSON
  googleTasksListTasklists(params: JSON): JSON
  googleTasksEnsureKanbanLists(params: JSON): JSON
  googleTasksListTasks(params: JSON): JSON
  metricsSummary(params: JSON): JSON
  metricsProviders(params: JSON): JSON
  metricsCouncil(params: JSON): JSON
  listModels(providerName: String!): JSON
  systemHealth(params: JSON): JSON
  systemReady(params: JSON): JSON
  weatherForecast(params: JSON): JSON
  workflowDefinitions: [WorkflowDefinition!]!
  workflowRuns(workflowId: String): [WorkflowRun!]!
  widgetLayout: WidgetLayout
  installedApps: InstalledApps
  linkedGoogleAccounts: JSON
  getLinkedGoogleAccountToken(googleUserId: String!): JSON
  todoWorkspaces(googleUserId: String!): [TodoWorkspace!]!
  todoTasks(workspaceId: String!): [TodoTask!]!
}

type Mutation {
  signUp(email: String!, password: String!, metadata: JSON): AuthPayload!
  signIn(email: String!, password: String!): AuthPayload!
  refreshSession(refreshToken: String): RefreshPayload!

  chatCompletion(params: JSON!): JSON!
  deleteConversation(conversationId: String!): JSON!

  analyzeAgent(agentType: String!, pageData: JSON!, query: String, options: JSON): JSON!
  autoAnalyze(pageData: JSON!, query: String!): JSON!
  batchAnalyze(params: JSON!): JSON!
  agentsQuickSeo(params: JSON!): JSON!
  agentsSummarize(params: JSON!): JSON!

  ragIngest(params: JSON!): JSON!
  ragDelete(documentId: String!): JSON!
  ragUpload(params: JSON!): JSON!
  ragChat(params: JSON!): JSON!

  storageUpload(params: JSON!): JSON!
  storageDelete(params: JSON!): JSON!
  storageMove(params: JSON!): JSON!
  storageMkdir(params: JSON!): JSON!
  storageGetUrl(params: JSON!): JSON!
  storageCreateSignedUrl(params: JSON!): JSON!
  storageBucketsCreate(params: JSON!): JSON!
  storageBucketsDelete(params: JSON!): JSON!

  analyzeImage(params: JSON!): JSON!
  visionNvidia(params: JSON!): JSON!

  textToImage(params: JSON!): JSON!
  imageToText(params: JSON!): JSON!
  speechToText(params: JSON!): JSON!
  textToSpeech(params: JSON!): JSON!
  objectDetection(params: JSON!): JSON!

  runCouncil(params: JSON!): JSON!

  providerChat(providerName: String!, params: JSON!): JSON!

  generateImage(params: JSON!): JSON!
  generateAudio(params: JSON!): JSON!
  generateVideo(params: JSON!): JSON!
  elevenlabsTextToSpeech(params: JSON!): JSON!
  deepgramTranscribe(params: JSON!): JSON!
  imagenGenerate(params: JSON!): JSON!
  veoGenerate(params: JSON!): JSON!

  processNlp(params: JSON!): JSON!
  scrape(params: JSON!): JSON!
  runBenchmark(params: JSON!): JSON!
  batchProcess(params: JSON!): JSON!
  embeddingsGemini(params: JSON!): JSON!
  cohereSummarize(params: JSON!): JSON!
  cohereEmbed(params: JSON!): JSON!
  cohereClassify(params: JSON!): JSON!

  createWorkflowDefinition(name: String!, spec: JSON!): WorkflowDefinition!
  startWorkflowRun(workflowId: String!): WorkflowRun!
  saveWidgetLayout(layoutJson: JSON!): WidgetLayout!
  saveInstalledApps(appIds: [String!]!): InstalledApps!
  saveFileAssociations(associations: JSON!): InstalledApps!

  addLinkedGoogleAccount(params: JSON!): JSON!
  removeLinkedGoogleAccount(googleUserId: String!): JSON!
  refreshLinkedGoogleAccountToken(
    googleUserId: String!
    accessToken: String!
    expiresAt: Float!
    scopesGranted: String
  ): JSON!

  googleTasksInsertTask(params: JSON): JSON!
  googleTasksUpdateTask(params: JSON): JSON!
  googleTasksDeleteTask(params: JSON): JSON!
  googleTasksMoveTask(params: JSON): JSON!

  createTodoWorkspace(googleUserId: String!, name: String!, params: JSON): TodoWorkspace!
  renameTodoWorkspace(workspaceId: String!, name: String!): TodoWorkspace!
  deleteTodoWorkspace(workspaceId: String!): Boolean!

  createTodoTask(workspaceId: String!, column: String!, title: String!): TodoTask!
  moveTodoTask(taskId: String!, column: String!, previousTaskId: String): TodoTask!
  deleteTodoTask(taskId: String!): Boolean!
}

type GqlUserProfile {
  username: String
  avatarUrl: String
  bio: String
  preferences: JSON
  createdAt: String
  updatedAt: String
}

type GqlUser {
  id: String!
  email: String
  userMetadata: JSON!
  appMetadata: JSON!
  createdAt: String
  updatedAt: String
  isActive: Boolean!
  isVerified: Boolean!
  profile: GqlUserProfile
}

type GqlSession {
  accessToken: String!
  refreshToken: String!
  expiresIn: Int!
  expiresAt: Float
  tokenType: String!
}

type AuthPayload {
  success: Boolean!
  requiresConfirmation: Boolean!
  user: GqlUser
  session: GqlSession
}

type RefreshPayload {
  success: Boolean!
  session: GqlSession
}

type WorkflowDefinition {
  id: ID!
  name: String!
  ownerId: String
  spec: JSON!
  createdAt: String!
  updatedAt: String!
}

type TodoWorkspace {
  id: ID!
  name: String!
  storage: String!
  googleUserId: String!
  backlogListId: String!
  todoListId: String!
  doingListId: String!
  doneListId: String!
  createdAt: String!
  updatedAt: String!
}

type TodoTask {
  id: ID!
  title: String!
  column: String!
  sortOrder: Float!
  workspaceId: ID!
  createdAt: String!
  updatedAt: String!
}

type WorkflowRun {
  id: ID!
  workflowId: String!
  ownerId: String
  status: String!
  createdAt: String!
  updatedAt: String!
}

type WidgetLayout {
  id: ID!
  ownerId: String!
  layoutJson: JSON!
  updatedAt: String!
}

type InstalledApps {
  id: ID!
  ownerId: String!
  appIds: [String!]!
  fileAssociations: JSON
  updatedAt: String!
}
