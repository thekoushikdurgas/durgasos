  refreshLinkedGoogleAccountToken(
    googleUserId: String!
    accessToken: String!
    expiresAt: Float!
    scopesGranted: String = null
  ): JSON!
  addLinkedGithubAccount(params: JSON!): JSON!
  removeLinkedGithubAccount(githubUserId: String!): JSON!
  updateAiProviderSettings(updates: JSON!): JSON!
  googleTasksInsertTask(params: JSON = null): JSON!
  googleTasksUpdateTask(params: JSON = null): JSON!
  googleTasksDeleteTask(params: JSON = null): JSON!
  googleTasksMoveTask(params: JSON = null): JSON!
  createTodoWorkspace(googleUserId: String!, name: String!, params: JSON = null): TodoWorkspace!
  renameTodoWorkspace(workspaceId: String!, name: String!): TodoWorkspace!
  deleteTodoWorkspace(workspaceId: String!): Boolean!
