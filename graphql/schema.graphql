  runCouncil(params: JSON!): JSON!
  providerChat(providerName: String!, params: JSON!): JSON!
  generateImage(params: JSON!): JSON!
  generateAudio(params: JSON!): JSON!
  generateVideo(params: JSON!): JSON!
  elevenlabsTextToSpeech(params: JSON!): JSON!
  deepgramTranscribe(params: JSON!): JSON!
  imagenGenerate(params: JSON!): JSON!
  veoGenerate(params: JSON!): JSON!
  processNlp(params: JSON!): JSON!
  scrape(params: JSON!): JSON!
  runBenchmark(params: JSON!): JSON!
  batchProcess(params: JSON!): JSON!
  embeddingsGemini(params: JSON!): JSON!
  cohereSummarize(params: JSON!): JSON!
  cohereEmbed(params: JSON!): JSON!
  cohereClassify(params: JSON!): JSON!
  createWorkflowDefinition(name: String!, spec: JSON!): WorkflowDefinition!
  startWorkflowRun(workflowId: String!): WorkflowRun!
  saveWidgetLayout(layoutJson: JSON!): WidgetLayout!
  saveInstalledApps(appIds: [String!]!): InstalledApps!
