type RefreshPayload {
  success: Boolean!
  session: GqlSession
}

type SessionCookieMutationResult {
  ok: Boolean!
  error: String
}

type TodoComment {
  id: ID!
  taskId: String!
  ownerId: String!
  content: String!
  createdAt: String!
  updatedAt: String!
}

type TodoTask {
  id: ID!
  title: String!
  column: String!
  sortOrder: Float!
  workspaceId: ID!
  createdAt: String!
  updatedAt: String!
}

type TodoWorkspace {
  id: ID!
