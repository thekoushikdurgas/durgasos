# SDL mirrors Strawberry schema in ai.backend/app/graphql/schema.py (offline codegen).
schema: graphql/schema.graphql
documents:
  - 'graphql/**/*.graphql'
# Some SDL-only modules have no .graphql documents yet; keep true until every module has ops.
ignoreNoDocuments: true
generates:
  graphql/generated/:
    preset: client
    presetConfig:
      gqlTagName: gql
